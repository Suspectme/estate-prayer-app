 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Prayer Times</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Our CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- ====== HEADER ====== -->
        <header class="app-header">
            <h1><i class="fas fa-mosque"></i> Estate Timings</h1>
            <div class="header-actions">
                <span class="user-badge" id="userBadge">Guest</span>
                <button id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- ====== AUTH VIEW (Login / Register) ====== -->
        <div id="authView" class="view">
            <div class="auth-logo"><i class="fas fa-mosque"></i></div>
            <h2>Welcome</h2>
            <p class="sub">Prayer times &amp; announcements for your estate</p>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="active" data-tab="login">Login</button>
                <button data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-primary" id="loginBtn">Sign In</button>
                <div class="auth-error" id="authError"></div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Ahmed ibn Ali">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="regRole">
                        <option value="user">Estate User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button class="btn-primary" id="registerBtn">Create Account</button>
                <div class="auth-error" id="regError"></div>
            </div>
        </div>

        <!-- ====== MAIN VIEW (Dashboard) ====== -->
        <div id="mainView" class="view hidden">

            <!-- Announcement Section -->
            <div id="announcementContainer"></div>

            <!-- Prayer Times Grid -->
            <div class="prayer-grid" id="prayerGrid"></div>

            <!-- Admin Panel (hidden for regular users) -->
            <div id="adminPanel" class="admin-panel hidden">
                <h3><i class="fas fa-crown"></i> Admin Controls</h3>

                <!-- Announcement Editor -->
                <div class="form-group">
                    <label>Today's Announcement</label>
                    <textarea id="adminAnnouncement" placeholder="Write today's announcement…"></textarea>
                </div>
                <button class="btn-secondary" id="publishAnnouncementBtn">
                    <i class="fas fa-bullhorn"></i> Publish Announcement
                </button>
                <div class="admin-msg" id="announcementMsg"></div>

                <hr>

                <!-- Prayer Time Editor -->
                <p class="edit-label"><i class="fas fa-edit"></i> Edit Prayer Times</p>
                <div id="prayerEditContainer"></div>
                <div class="admin-msg" id="prayerEditMsg"></div>
            </div>

            <!-- Footer note -->
            <p class="footer-note">
                <i class="fas fa-sync-alt fa-fw"></i> Auto‑updates in real‑time
            </p>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Socket.io Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- Our JavaScript file -->
    <script src="script.js"></script>

</body>
</html>
